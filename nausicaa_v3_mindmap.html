<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nausicaa v3 — System Schematic</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #070a07;
  --grid:     rgba(0,255,65,0.04);
  --green:    #00ff41;
  --amber:    #ffb000;
  --cyan:     #00e5ff;
  --red:      #ff3333;
  --dim:      #1a2e1a;
  --dimmer:   #0d180d;
  --text-dim: rgba(0,255,65,0.45);
  --panel-bg: rgba(7,10,7,0.97);
  --trace:    rgba(0,255,65,0.5);
  --trace-hi: rgba(0,255,65,1);
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  overflow: hidden;
  font-family: 'Share Tech Mono', monospace;
  cursor: crosshair;
  color: var(--green);
}

/* PCB grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none; z-index: 0;
}

/* Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
  );
  pointer-events: none; z-index: 1;
}

/* CRT glow vignette */
.vignette {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse at center,
    transparent 55%,
    rgba(0,0,0,0.7) 100%);
}

/* Header */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(0,255,65,0.15);
  background: rgba(7,10,7,0.9);
  backdrop-filter: blur(4px);
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 16px; font-weight: 900;
  color: var(--green);
  letter-spacing: 0.2em;
  text-shadow: 0 0 20px rgba(0,255,65,0.6);
}
.logo span { color: var(--amber); }

.header-right {
  display: flex; gap: 24px; align-items: center;
}

.stat {
  font-size: 10px; color: var(--text-dim);
  letter-spacing: 0.1em;
}
.stat strong { color: var(--green); }

.legend {
  display: flex; gap: 16px;
}
.leg {
  font-size: 9px; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
  letter-spacing: 0.08em;
}
.leg-chip {
  width: 12px; height: 8px;
  border: 1px solid currentColor;
  border-radius: 1px;
}

/* SVG canvas */
#canvas {
  position: relative; z-index: 10;
  width: 100%; height: 100%;
}

/* Tooltip / info panel */
#panel {
  position: fixed; right: 24px; top: 64px;
  width: 320px;
  background: var(--panel-bg);
  border: 1px solid rgba(0,255,65,0.25);
  border-top: 2px solid var(--green);
  padding: 0;
  z-index: 200;
  display: none;
  box-shadow: 0 0 40px rgba(0,255,65,0.08), -4px 0 0 rgba(0,255,65,0.1);
}

.panel-header {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(0,255,65,0.15);
  display: flex; align-items: center; gap: 8px;
}
.panel-tag {
  font-size: 9px; padding: 2px 6px;
  border: 1px solid currentColor;
  border-radius: 2px;
  letter-spacing: 0.1em;
}
.panel-name {
  font-family: 'Orbitron', monospace;
  font-size: 12px; font-weight: 700;
  color: var(--green);
  flex: 1;
}
.panel-body { padding: 12px 14px; }
.panel-file {
  font-size: 10px; color: var(--amber);
  margin-bottom: 8px;
  letter-spacing: 0.06em;
}
.panel-desc {
  font-size: 11px; color: rgba(0,255,65,0.75);
  line-height: 1.7;
}
.panel-deps {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid rgba(0,255,65,0.1);
  font-size: 10px; color: var(--text-dim);
  line-height: 1.8;
}
.panel-deps strong { color: var(--cyan); }

/* Hint */
#hint {
  position: fixed; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; color: rgba(0,255,65,0.25);
  letter-spacing: 0.15em;
  z-index: 100; pointer-events: none;
  text-transform: uppercase;
}

/* SVG node styles (applied via JS) */
.node-rect {
  rx: 2; ry: 2;
  transition: filter 0.15s;
}

/* Blinking cursor effect on active node */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.blink { animation: blink 1.2s ease-in-out infinite; }

/* Flicker on load */
@keyframes flicker {
  0%{opacity:0} 10%{opacity:0.8} 12%{opacity:0.2} 14%{opacity:0.9}
  20%{opacity:0.85} 50%{opacity:1} 100%{opacity:1}
}
#canvas { animation: flicker 0.6s ease-out forwards; }
</style>
</head>
<body>
<div class="vignette"></div>

<div id="header">
  <div class="logo">NAUSICAA <span>v3</span></div>
  <div class="header-right">
    <div class="stat">FILES: <strong>5</strong></div>
    <div class="stat">BACKEND: <strong>LLAMA.CPP</strong></div>
    <div class="stat">QUANT: <strong>Q4_K_M</strong></div>
    <div class="legend">
      <div class="leg" style="color:#ffb000"><div class="leg-chip"></div>ENTRY</div>
      <div class="leg" style="color:#00e5ff"><div class="leg-chip"></div>INFERENCE</div>
      <div class="leg" style="color:#00ff41"><div class="leg-chip"></div>TOOLS/AGENT</div>
      <div class="leg" style="color:#ff3333"><div class="leg-chip"></div>SANDBOX</div>
    </div>
  </div>
</div>

<div id="panel">
  <div class="panel-header">
    <div class="panel-tag" id="pt-tag">MODULE</div>
    <div class="panel-name" id="pt-name"></div>
  </div>
  <div class="panel-body">
    <div class="panel-file" id="pt-file"></div>
    <div class="panel-desc" id="pt-desc"></div>
    <div class="panel-deps" id="pt-deps"></div>
  </div>
</div>

<svg id="canvas"></svg>
<div id="hint">CLICK TO EXPAND · HOVER FOR DETAILS · SCROLL TO ZOOM · DRAG TO PAN</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const tree = {
  id: "root", label: "NAUSICAA v3", file: "", color: "#ffb000",
  desc: "Voice AI coding assistant. 5 files, one GGUF, Docker sandbox. llama.cpp replaces the entire transformers stack.",
  deps: "",
  children: [
    {
      id: "config", label: "config.yaml", file: "config.yaml", color: "#ffb000",
      desc: "All settings in one flat YAML file. No nested Python config modules. Edit workspace path, model path, GPU layers, Docker memory, voice VAD threshold.",
      deps: "Read by: main.py → passed as dict to all components",
      children: [
        { id: "cfg_llm", label: "llm:", file: "config.yaml §llm", color: "#ffb000",
          desc: "model: path to .gguf file\nn_gpu_layers: -1 = full GPU, 0 = CPU\nn_ctx: KV cache size (2048 tokens)\nmax_tokens, temperature, top_p, top_k, repeat_penalty", deps: "" },
        { id: "cfg_stt", label: "stt:", file: "config.yaml §stt", color: "#ffb000",
          desc: "binary: path to compiled whisper.cpp/main\nmodel: ggml-base.en.bin\nlang: en", deps: "" },
        { id: "cfg_tts", label: "tts:", file: "config.yaml §tts", color: "#ffb000",
          desc: "binary: path to piper binary\nmodel: en_US-lessac-medium.onnx\nrate: speaking speed (1.0 = normal)", deps: "" },
        { id: "cfg_docker", label: "docker:", file: "config.yaml §docker", color: "#ff3333",
          desc: "image: debian:bookworm-slim\nmemory: 512m\ncpus: 1.0\npids: 128 (prevents fork bombs)\nnetwork: none (air-gapped)", deps: "" },
      ]
    },
    {
      id: "inference", label: "inference.py", file: "inference.py", color: "#00e5ff",
      desc: "All three inference backends in one file. LLM via llama-cpp-python (C bindings). STT via whisper.cpp subprocess. TTS via Piper subprocess. Zero PyTorch.",
      deps: "Used by: main.py\nPackages: llama-cpp-python, soundfile, numpy",
      children: [
        {
          id: "llm_class", label: "class LLM", file: "inference.py → LLM", color: "#00e5ff",
          desc: "Wraps llama-cpp-python. One Llama() instance lives the whole session. Calls create_chat_completion(messages) which handles template + tokenization + generation.",
          deps: "pip install llama-cpp-python\nCMAKE_ARGS=\"-DGGML_CUDA=on\" for CUDA",
          children: [
            { id: "gguf", label: "GGUF format", file: ".gguf binary", color: "#00e5ff",
              desc: "Single binary containing EVERYTHING:\n• Architecture metadata (n_layers, n_heads, rope_freq)\n• BPE tokenizer vocabulary (32k tokens)\n• Jinja2 chat template (<|system|>…</s>)\n• Quantized weights (Q4_K_M: 4-bit, 256w blocks)\n\nNo config.json, tokenizer.json, safetensors.", deps: "" },
            { id: "llama_init", label: "Llama() constructor", file: "inference.py:LLM.__init__", color: "#00e5ff",
              desc: "1. mmap .gguf → weights not fully loaded into RAM\n2. Reads arch from GGUF header\n3. Allocates KV cache:\n   n_ctx × n_layers × 2 × head_dim × fp16\n   TinyLlama Q4_K_M: ~360 MB\n4. Offloads n_gpu_layers tensors to VRAM", deps: "" },
            { id: "chat_completion", label: "create_chat_completion()", file: "inference.py:LLM.generate", color: "#00e5ff",
              desc: "1. Apply chat template from GGUF metadata\n   → <|system|>…</s><|user|>…</s><|assistant|>\n2. Tokenize with GGUF vocab\n3. Prefill: all prompt tokens in one batch\n   → fills KV cache\n4. Decode loop (one token/step):\n   → Q for new token only\n   → K,V from cache = O(1) per step\n   → temperature→top-k→top-p→multinomial\n5. Stop at eos or stop string", deps: "" },
            { id: "q4km", label: "Q4_K_M quant", file: ".gguf quantization", color: "#00e5ff",
              desc: "4-bit quantization scheme:\n• Every 256 weights share 2 float16 scales\n• Effective: ~4.125 bits per weight\n• TinyLlama 1.1B: 668 MB, ~0.5 GB VRAM\n• Quality ≈ fp16 for inference tasks\n• Computed in GGML's AVX2/CUDA int4 matmul", deps: "" },
          ]
        },
        { id: "stt_class", label: "class STT", file: "inference.py → STT", color: "#00e5ff",
          desc: "Subprocess wrapper for whisper.cpp binary.\nflow: float32 numpy array → temp WAV file → whisper.cpp binary → parse stdout → transcript string.\nNo openai-whisper Python package needed.",
          deps: "Needs: compiled whisper.cpp/main binary\nggml-base.en.bin model (~147 MB)" },
        { id: "tts_class", label: "class TTS", file: "inference.py → TTS", color: "#00e5ff",
          desc: "Pipes text → Piper binary → raw int16 PCM → aplay (ALSA).\nPiper uses ONNX Runtime internally.\nZero latency overhead vs sounddevice — direct pipe to kernel audio.",
          deps: "Needs: piper binary from GitHub releases\nen_US-lessac-medium.onnx model" },
      ]
    },
    {
      id: "tools_file", label: "tools.py", file: "tools.py", color: "#00ff41",
      desc: "The biggest file. Contains: Docker sandbox class, @tool decorator + all 9 tools, ReAct Agent class with conversation history. Everything that touches the filesystem or runs commands lives here.",
      deps: "Used by: main.py\nImports: subprocess, shlex, json, re, pathlib",
      children: [
        {
          id: "sandbox_class", label: "class Sandbox", file: "tools.py → Sandbox", color: "#ff3333",
          desc: "Manages the Docker container lifecycle. Starts on Agent init, stops via atexit hook. Provides safe() path guard and exec() for docker exec.",
          deps: "Requires: docker in PATH, user in docker group",
          children: [
            { id: "docker_run", label: "docker run", file: "Sandbox.start()", color: "#ff3333",
              desc: "docker run -d\n  --network none          # air-gapped\n  --memory 512m           # OOM protection\n  --read-only             # immutable root fs\n  --tmpfs /tmp:size=64m   # writable scratch\n  --pids-limit 128        # no fork bombs\n  --security-opt no-new-privileges\n  -v /workspace:/workspace:rw\n  debian:bookworm-slim sleep infinity", deps: "" },
            { id: "safe_fn", label: "safe(path)", file: "Sandbox.safe()", color: "#ff3333",
              desc: "Host-side path validation.\nPath.resolve() strips ../ and symlinks.\nChecks resolved path starts with workspace root.\nRaises PermissionError on any escape attempt.\nCalled before EVERY file operation.", deps: "" },
            { id: "exec_fn", label: "exec(cmd)", file: "Sandbox.exec()", color: "#ff3333",
              desc: "Translates host cwd → container path.\nRuns: docker exec --workdir /workspace/<cwd> <container> <cmd>\nReturns CompletedProcess with stdout/stderr.\nAll shell tool calls go through here.", deps: "" },
          ]
        },
        {
          id: "tools_reg", label: "@tool decorator", file: "tools.py → TOOLS dict", color: "#00ff41",
          desc: "Minimalist tool registration. @tool(name, desc, params) stores the function in global TOOLS dict. Agent.chat() looks tools up by name from LLM output. No BaseTool classes, no registry module.",
          deps: "All tools share one Sandbox instance",
          children: [
            { id: "file_tools", label: "File I/O tools", file: "tools.py → _make_file_tools()", color: "#00ff41",
              desc: "Python-direct I/O on host mount (faster than docker exec):\nread_file(path [start_line, end_line])\nwrite_file(path, content)\npatch_file(path, old_str, new_str)\ndelete_file(path)\nlist_dir([depth])\nmake_dir(path)\nmove(src, dst)\n\nAll call safe() before touching disk.", deps: "" },
            { id: "shell_tool", label: "run_shell", file: "tools.py → _make_shell_tool()", color: "#ff3333",
              desc: "Routes commands through docker exec.\nBanned permanently: rm, rmdir, sudo, su, docker, nsenter.\nShell chars blocked: | ; & > < ` $\nOptional whitelist from config.yaml.\nDockercontainer IS the primary security — not the whitelist.", deps: "" },
            { id: "search_tools", label: "Search tools", file: "tools.py → _make_search_tools()", color: "#00ff41",
              desc: "search_code(pattern [path, glob]):\n  rg inside container → fallback to grep\n  Returns filename:line:match\n\nfind_file(name [path]):\n  find inside container\n  Container paths translated back to relative", deps: "" },
          ]
        },
        {
          id: "agent_class", label: "class Agent", file: "tools.py → Agent", color: "#00ff41",
          desc: "ReAct loop. Keeps message history. Each chat() call builds full message list (system + history), calls LLM.generate(), parses output for TOOL: or ANSWER:, executes tool if needed, injects TOOL_RESULT, loops.",
          deps: "Max iterations from config (default 8)\nHistory trimmed to last 20 turns",
          children: [
            { id: "react_loop", label: "ReAct loop", file: "Agent.chat()", color: "#00ff41",
              desc: "for i in range(max_iter):\n  messages = [system] + history\n  raw = llm.generate(messages)\n  \n  if ANSWER: found:\n    append to history, return\n  \n  if TOOL:/ARGS: found:\n    result = run_tool(name, args)\n    append tool call to history\n    append TOOL_RESULT to history\n    continue\n  \n  else: treat raw as answer", deps: "" },
            { id: "sys_prompt", label: "System prompt", file: "tools.py → SYSTEM_PROMPT", color: "#00ff41",
              desc: "Few-shot examples are ESSENTIAL for TinyLlama-1.1B:\n• 4 examples showing TOOL:/ARGS: format\n• Covers: list files, read file, grep, greeting\n• Hard rule: NEVER write code as answer\n• Tool schemas: one compact line each\n• Total: ~620 tokens (fits 2048 context)", deps: "" },
          ]
        },
      ]
    },
    {
      id: "main_file", label: "main.py", file: "main.py", color: "#ffb000",
      desc: "Entry point. --cli starts text REPL. Default starts voice pipeline. Loads YAML config, creates LLM + Agent + optional STT/TTS. Listener class does mic capture + VAD.",
      deps: "python main.py --cli  (text mode)\npython main.py        (voice mode)",
      children: [
        { id: "listener", label: "class Listener", file: "main.py → Listener", color: "#ffb000",
          desc: "PyAudio mic capture + energy-based VAD.\nNo webrtcvad package needed.\n\n30ms frames @ 16kHz (480 samples)\nRMS per frame: √(mean(samples²))\nIf RMS > threshold → speech started\nN consecutive quiet frames → utterance done\nReturns float32 numpy array", deps: "" },
        { id: "run_voice", label: "run_voice()", file: "main.py → run_voice()", color: "#ffb000",
          desc: "Voice pipeline:\n1. Listener.listen_once() → audio array\n2. STT.transcribe(audio) → text\n3. Agent.chat(text) → answer\n4. TTS.speak(answer) → aplay\n5. Back to step 1\n\nThreaded so mic keeps capturing while LLM generates.", deps: "" },
        { id: "run_cli", label: "run_cli()", file: "main.py → run_cli()", color: "#ffb000",
          desc: "Rich text REPL. No mic or speaker needed.\nCommands: /reset (clear history), /tree (show workspace), exit.\nShows full tracebacks on error.\nGood for testing tools without voice hardware.", deps: "" },
        { id: "i3status", label: "set_status()", file: "main.py → set_status()", color: "#ffb000",
          desc: "Writes state to /tmp/nausicaa_status.\ni3blocks reads this file every second.\n\nStates:\n  idle / listening / thinking… / speaking\n\nAdd to i3blocks.conf:\n[nausicaa]\ncommand=cat /tmp/nausicaa_status\ninterval=1", deps: "" },
      ]
    },
  ]
};

// ── Layout constants ──────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const ROOT_X = 100, ROW_H = 42, COL_W = 220;

const colors = {
  "#ffb000": { stroke: "#ffb000", fill: "rgba(255,176,0,0.07)", text: "#ffb000" },
  "#00e5ff": { stroke: "#00e5ff", fill: "rgba(0,229,255,0.06)", text: "#00e5ff" },
  "#00ff41": { stroke: "#00ff41", fill: "rgba(0,255,65,0.06)",  text: "#00ff41" },
  "#ff3333": { stroke: "#ff3333", fill: "rgba(255,51,51,0.07)", text: "#ff3333" },
};

// ── SVG setup ─────────────────────────────────────────────────────────────────
const svg = document.getElementById("canvas");
svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

// Glow filters per color
const glowDefs = [
  ["glow-amber", "#ffb000"],
  ["glow-cyan",  "#00e5ff"],
  ["glow-green", "#00ff41"],
  ["glow-red",   "#ff3333"],
];
glowDefs.forEach(([id, col]) => {
  const f = document.createElementNS("http://www.w3.org/2000/svg", "filter");
  f.setAttribute("id", id);
  f.setAttribute("x", "-50%"); f.setAttribute("y", "-50%");
  f.setAttribute("width", "200%"); f.setAttribute("height", "200%");
  const blur = document.createElementNS("http://www.w3.org/2000/svg", "feGaussianBlur");
  blur.setAttribute("in", "SourceGraphic"); blur.setAttribute("stdDeviation", "3");
  blur.setAttribute("result", "blur");
  const flood = document.createElementNS("http://www.w3.org/2000/svg", "feFlood");
  flood.setAttribute("flood-color", col); flood.setAttribute("flood-opacity", "0.4");
  flood.setAttribute("result", "color");
  const comp = document.createElementNS("http://www.w3.org/2000/svg", "feComposite");
  comp.setAttribute("in", "color"); comp.setAttribute("in2", "blur");
  comp.setAttribute("operator", "in"); comp.setAttribute("result", "glow");
  const merge = document.createElementNS("http://www.w3.org/2000/svg", "feMerge");
  ["glow", "SourceGraphic"].forEach(inp => {
    const mn = document.createElementNS("http://www.w3.org/2000/svg", "feMergeNode");
    mn.setAttribute("in", inp); merge.appendChild(mn);
  });
  [blur, flood, comp, merge].forEach(n => f.appendChild(n));
  defs.appendChild(f);
});
svg.appendChild(defs);

const filterMap = {
  "#ffb000": "url(#glow-amber)",
  "#00e5ff": "url(#glow-cyan)",
  "#00ff41": "url(#glow-green)",
  "#ff3333": "url(#glow-red)",
};

// Main group for pan/zoom
const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
g.setAttribute("id", "world");
svg.appendChild(g);

// Layers
const tracesG = document.createElementNS("http://www.w3.org/2000/svg", "g");
const nodesG  = document.createElementNS("http://www.w3.org/2000/svg", "g");
g.appendChild(tracesG);
g.appendChild(nodesG);

// ── Layout computation ────────────────────────────────────────────────────────
let allNodes = [];
let expanded = new Set(["root"]); // root always expanded

function computeLayout(node, depth, y) {
  const x = ROOT_X + depth * COL_W;
  node._x = x;
  node._y = y;
  node._depth = depth;
  node._visible = true;
  allNodes.push(node);

  let curY = y + ROW_H;
  if (node.children && expanded.has(node.id)) {
    for (const child of node.children) {
      curY = computeLayout(child, depth + 1, curY);
    }
  }
  return curY;
}

function relayout() {
  allNodes = [];
  computeLayout(tree, 0, 60);
}

// ── SVG helpers ───────────────────────────────────────────────────────────────
function svgEl(tag, attrs={}) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function makeLabel(text, maxLen=22) {
  if (text.length <= maxLen) return text;
  return text.slice(0, maxLen - 1) + "…";
}

const NODE_W = 190, NODE_H = 28;

// ── Render ────────────────────────────────────────────────────────────────────
let selectedNode = null;

function render() {
  relayout();

  // Clear
  while (tracesG.firstChild) tracesG.removeChild(tracesG.firstChild);
  while (nodesG.firstChild)  nodesG.removeChild(nodesG.firstChild);

  // Draw traces first (behind nodes)
  for (const node of allNodes) {
    if (!node.children) continue;
    const childrenToShow = expanded.has(node.id) ? node.children : [];
    for (const child of childrenToShow) {
      if (!allNodes.includes(child)) continue;
      drawTrace(node, child);
    }
  }

  // Draw nodes
  for (const node of allNodes) {
    drawNode(node);
  }
}

function drawTrace(parent, child) {
  const px = parent._x + NODE_W;
  const py = parent._y + NODE_H / 2;
  const cx = child._x;
  const cy = child._y + NODE_H / 2;
  const col = child.color || parent.color || "#00ff41";
  const alpha = selectedNode && selectedNode.id !== parent.id && selectedNode.id !== child.id ? 0.12 : 0.55;

  // PCB-style orthogonal trace: right → down → right
  const midX = px + (cx - px) * 0.4;
  const path = svgEl("path", {
    d: `M ${px} ${py} L ${midX} ${py} L ${midX} ${cy} L ${cx} ${cy}`,
    stroke: col,
    "stroke-width": "1.5",
    "stroke-opacity": alpha,
    fill: "none",
    "stroke-linecap": "square",
  });
  tracesG.appendChild(path);

  // Junction dot at corner
  const dot = svgEl("circle", {
    cx: midX, cy: py, r: 2.5,
    fill: col, "fill-opacity": alpha,
  });
  tracesG.appendChild(dot);

  // Terminal dot at node entry
  const term = svgEl("circle", {
    cx: cx, cy: cy, r: 2,
    fill: col, "fill-opacity": alpha,
  });
  tracesG.appendChild(term);
}

function drawNode(node) {
  const { _x: x, _y: y, color = "#00ff41" } = node;
  const c = colors[color] || colors["#00ff41"];
  const hasChildren = node.children && node.children.length > 0;
  const isExpanded = expanded.has(node.id);
  const isSelected = selectedNode && selectedNode.id === node.id;
  const isRoot = node.id === "root";

  const grp = svgEl("g", { "data-id": node.id, style: "cursor:pointer" });

  // Chip border glow (when selected)
  if (isSelected) {
    const glow = svgEl("rect", {
      x: x - 3, y: y - 3,
      width: NODE_W + 6, height: NODE_H + 6,
      rx: 3, ry: 3,
      fill: "none",
      stroke: color, "stroke-width": "1", "stroke-opacity": "0.3",
      filter: filterMap[color],
    });
    grp.appendChild(glow);
  }

  // Main chip body
  const rect = svgEl("rect", {
    x, y,
    width: isRoot ? NODE_W + 20 : NODE_W,
    height: NODE_H,
    rx: 2, ry: 2,
    fill: c.fill,
    stroke: color,
    "stroke-width": isRoot ? 2 : isSelected ? 1.5 : 0.8,
    "stroke-opacity": isSelected || isRoot ? 1 : 0.6,
  });
  grp.appendChild(rect);

  // Top-left pin dots (decorative PCB style)
  if (!isRoot) {
    [4, 12, 20].forEach(offset => {
      const pin = svgEl("rect", {
        x: x - 4, y: y + offset,
        width: 4, height: 2,
        fill: color, "fill-opacity": 0.4,
      });
      grp.appendChild(pin);
    });
  }

  // Expand/collapse indicator
  if (hasChildren) {
    const indicator = svgEl("text", {
      x: x + 8, y: y + NODE_H / 2 + 5,
      "text-anchor": "middle",
      "font-family": "Share Tech Mono, monospace",
      "font-size": "10",
      fill: color, "fill-opacity": isExpanded ? 1 : 0.6,
    });
    indicator.textContent = isExpanded ? "▼" : "▶";
    grp.appendChild(indicator);
  }

  // Node label
  const labelX = hasChildren ? x + 20 : x + 10;
  const depth = node._depth || 0;
  const fontSize = isRoot ? 13 : depth >= 2 ? 10 : 11;

  const label = svgEl("text", {
    x: labelX, y: y + NODE_H / 2 + fontSize * 0.38,
    "font-family": isRoot ? "Orbitron, monospace" : "Share Tech Mono, monospace",
    "font-size": fontSize,
    "font-weight": isRoot ? 700 : 400,
    fill: color,
    "fill-opacity": isSelected ? 1 : 0.85,
    "letter-spacing": isRoot ? "0.15em" : "0.05em",
  });
  label.textContent = makeLabel(node.label, isRoot ? 30 : 24);
  grp.appendChild(label);

  // File tag (small, right-aligned)
  if (node.file && !isRoot && depth < 2) {
    const fileLen = Math.min(node.file.length, 20);
    const tag = svgEl("text", {
      x: x + NODE_W - 6, y: y + NODE_H / 2 + 4,
      "text-anchor": "end",
      "font-family": "Share Tech Mono, monospace",
      "font-size": 8,
      fill: color, "fill-opacity": 0.3,
      "letter-spacing": "0.04em",
    });
    tag.textContent = node.file.slice(-fileLen);
    grp.appendChild(tag);
  }

  // Hover / click
  grp.addEventListener("mouseenter", () => {
    rect.setAttribute("fill-opacity", "1");
    rect.setAttribute("stroke-opacity", "1");
    showPanel(node);
  });
  grp.addEventListener("mouseleave", () => {
    rect.setAttribute("fill-opacity", c.fill.includes("0.07") ? "0.07" : "0.06");
    rect.setAttribute("stroke-opacity", isSelected || isRoot ? "1" : "0.6");
  });
  grp.addEventListener("click", (e) => {
    e.stopPropagation();
    if (hasChildren) {
      if (expanded.has(node.id)) {
        // Collapse: also collapse all descendants
        collapseAll(node);
      } else {
        expanded.add(node.id);
      }
      render();
    }
    selectedNode = node;
    showPanel(node);
    render();
  });

  nodesG.appendChild(grp);
}

function collapseAll(node) {
  expanded.delete(node.id);
  if (node.children) node.children.forEach(collapseAll);
}

// ── Info panel ────────────────────────────────────────────────────────────────
function showPanel(node) {
  const panel = document.getElementById("panel");
  const col = node.color || "#00ff41";
  panel.style.display = "block";
  panel.style.borderTopColor = col;
  document.getElementById("pt-tag").textContent = node._depth === 0 ? "SYSTEM" :
    node._depth === 1 ? "MODULE" : node._depth === 2 ? "CLASS" : "METHOD";
  document.getElementById("pt-tag").style.color = col;
  document.getElementById("pt-tag").style.borderColor = col;
  document.getElementById("pt-name").textContent = node.label;
  document.getElementById("pt-name").style.color = col;
  document.getElementById("pt-file").textContent = node.file ? `// ${node.file}` : "";
  document.getElementById("pt-desc").textContent = node.desc || "";
  const depsEl = document.getElementById("pt-deps");
  if (node.deps) {
    depsEl.style.display = "block";
    depsEl.innerHTML = `<strong>→</strong> ${node.deps.replace(/\n/g, "\n<strong>→</strong> ")}`;
  } else {
    depsEl.style.display = "none";
  }
}

svg.addEventListener("click", () => {
  document.getElementById("panel").style.display = "none";
  selectedNode = null;
  render();
});

// ── Pan/zoom ──────────────────────────────────────────────────────────────────
let tx = 0, ty = 40, scale = 1;
let dragging = false, lastX = 0, lastY = 0;

function applyTransform() {
  g.setAttribute("transform", `translate(${tx},${ty}) scale(${scale})`);
}

svg.addEventListener("wheel", e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.25, Math.min(3, scale * delta));
  applyTransform();
}, { passive: false });

svg.addEventListener("mousedown", e => {
  if (e.target === svg || e.target === g) {
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    svg.style.cursor = "grabbing";
  }
});
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener("mouseup", () => {
  dragging = false; svg.style.cursor = "crosshair";
});

// ── Initial state ─────────────────────────────────────────────────────────────
// Expand top-level children by default
tree.children.forEach(c => expanded.add(c.id));

render();
applyTransform();

// Animate initial trace draw
setTimeout(() => {
  tracesG.style.opacity = "0";
  tracesG.style.transition = "opacity 0.4s";
  setTimeout(() => tracesG.style.opacity = "1", 50);
}, 100);
</script>
</body>
</html>
